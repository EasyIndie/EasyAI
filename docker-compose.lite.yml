services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  litellm:
    build:
      context: ./litellm-service
    restart: unless-stopped
    environment:
      LITELLM_CONFIG_PATH: /app/config/litellm.yaml
      OLLAMA_HOST: http://ollama:11434
    ports:
      - "4000:4000"
    volumes:
      - ./config/litellm/litellm.yaml:/app/config/litellm.yaml
    depends_on:
      - ollama

volumes:
  ollama_data:
