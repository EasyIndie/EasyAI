x-postgres-password: &postgres_password "KVhkORQ+sPToe4lX4cGp5gbmmUMoxfw7YYHys4jUezk="

services:
  redis:
    image: redis:8.6.3-alpine
    restart: unless-stopped

  postgres:
    image: postgres:18.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: oneapi
      POSTGRES_PASSWORD: *postgres_password
      POSTGRES_DB: oneapi
    volumes:
      - postgres_data:/var/lib/postgresql

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

  litellm:
    build:
      context: ./litellm-service
    restart: unless-stopped
    volumes:
      - ./config/litellm/litellm.yaml:/app/config/litellm.yaml
    depends_on:
      - ollama

  oneapi:
    build:
      context: ./oneapi-gateway
    restart: unless-stopped
    ports:
      - "3003:3003"
    volumes:
      - ./config/oneapi/oneapi.yaml:/app/config/oneapi.yaml
    depends_on:
      - redis
      - postgres
      - litellm

  batch_worker:
    build:
      context: ./batch-worker
    restart: unless-stopped
    volumes:
      - ./config/oneapi/oneapi.yaml:/app/config/oneapi.yaml
    depends_on:
      - redis
      - postgres
      - oneapi

volumes:
  postgres_data:
  ollama_data:
