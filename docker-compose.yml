services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oneapi
      POSTGRES_PASSWORD: oneapi
      POSTGRES_DB: oneapi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  litellm:
    build:
      context: ./litellm-service
    environment:
      LITELLM_PORT: ${LITELLM_PORT:-4000}
      LITELLM_LOG_LEVEL: ${LITELLM_LOG_LEVEL:-info}
      LITELLM_CONFIG_PATH: ${LITELLM_CONFIG_PATH:-/app/config/litellm.yaml}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
    ports:
      - "4000:4000"
    volumes:
      - ./config/litellm/litellm.yaml:/app/config/litellm.yaml
    depends_on:
      - ollama

  oneapi:
    build:
      context: ./oneapi-gateway
    environment:
      APP_ENV: ${APP_ENV:-development}
      ONEAPI_PORT: ${ONEAPI_PORT:-8080}
      ONEAPI_LOG_LEVEL: ${ONEAPI_LOG_LEVEL:-info}
      ONEAPI_TRUST_PROXY: ${ONEAPI_TRUST_PROXY:-0}
      ONEAPI_TRUST_PROXY_HOPS: ${ONEAPI_TRUST_PROXY_HOPS:-}
      ONEAPI_ADMIN_USER: ${ONEAPI_ADMIN_USER:-admin}
      ONEAPI_ADMIN_PASS: ${ONEAPI_ADMIN_PASS:-admin}
      ONEAPI_AUTH_MODE: ${ONEAPI_AUTH_MODE:-apikey,oauth}
      ONEAPI_API_KEYS: ${ONEAPI_API_KEYS:-dev-key}
      ONEAPI_OAUTH_JWKS_URL: ${ONEAPI_OAUTH_JWKS_URL:-}
      ONEAPI_OAUTH_AUDIENCE: ${ONEAPI_OAUTH_AUDIENCE:-}
      ONEAPI_OAUTH_ISSUER: ${ONEAPI_OAUTH_ISSUER:-}
      ONEAPI_UPSTREAMS: ${ONEAPI_UPSTREAMS:-http://litellm:4000}
      ONEAPI_UPSTREAM_TIMEOUT_MS: ${ONEAPI_UPSTREAM_TIMEOUT_MS:-20000}
      ONEAPI_RATE_LIMIT_RPM: ${ONEAPI_RATE_LIMIT_RPM:-120}
      ONEAPI_CACHE_ENABLED: ${ONEAPI_CACHE_ENABLED:-1}
      ONEAPI_CACHE_TTL_SECONDS: ${ONEAPI_CACHE_TTL_SECONDS:-60}
      ONEAPI_CACHE_REPLAY_CHUNK_DELAY_MS: ${ONEAPI_CACHE_REPLAY_CHUNK_DELAY_MS:-0}
      ONEAPI_CACHE_REPLAY_MAX_TOTAL_MS: ${ONEAPI_CACHE_REPLAY_MAX_TOTAL_MS:-0}
      ONEAPI_CACHE_REPLAY_MODE: ${ONEAPI_CACHE_REPLAY_MODE:-fixed}
      ONEAPI_MODEL_MAP: ${ONEAPI_MODEL_MAP:-{"chat":"local/ollama:qwen2.5:0.5b","coder":"local/ollama:qwen2.5-coder:1.5b"}}
      ONEAPI_GUARDRAILS_ENABLED: ${ONEAPI_GUARDRAILS_ENABLED:-0}
      ONEAPI_GUARDRAILS_BLOCK_INTERNAL_IP: ${ONEAPI_GUARDRAILS_BLOCK_INTERNAL_IP:-1}
      ONEAPI_GUARDRAILS_INJECTION_KEYWORDS: ${ONEAPI_GUARDRAILS_INJECTION_KEYWORDS:-ignore all previous instructions,system prompt,developer message,jailbreak}
      ONEAPI_GUARDRAILS_PII_MASK_ENABLED: ${ONEAPI_GUARDRAILS_PII_MASK_ENABLED:-1}
      ONEAPI_INTERNAL_TOKEN: ${ONEAPI_INTERNAL_TOKEN:-dev-internal}
      ONEAPI_INTERNAL_TOKEN_ALLOW_CIDRS: ${ONEAPI_INTERNAL_TOKEN_ALLOW_CIDRS:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DATABASE_URL: ${DATABASE_URL:-postgres://oneapi:oneapi@postgres:5432/oneapi}
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - postgres
      - litellm

  batch_worker:
    build:
      context: ./batch-worker
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DATABASE_URL: ${DATABASE_URL:-postgres://oneapi:oneapi@postgres:5432/oneapi}
      ONEAPI_BASE_URL: ${ONEAPI_BASE_URL:-http://oneapi:8080}
      ONEAPI_INTERNAL_TOKEN: ${ONEAPI_INTERNAL_TOKEN:-dev-internal}
    depends_on:
      - redis
      - postgres
      - oneapi

volumes:
  postgres_data:
  ollama_data:
