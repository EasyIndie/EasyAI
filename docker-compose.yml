name: easyai-dev

x-postgres-password: &postgres_password "oneapi"

services:
  redis:
    image: redis:8.6.3-alpine
    restart: unless-stopped

  postgres:
    image: postgres:18.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: oneapi
      POSTGRES_PASSWORD: *postgres_password
      POSTGRES_DB: oneapi
    volumes:
      - postgres_data:/var/lib/postgresql

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

  litellm:
    build:
      context: ./litellm-service
    restart: unless-stopped
    volumes:
      - ./config/easyai.yaml:/app/config/easyai.yaml:ro
    depends_on:
      - ollama

  oneapi:
    build:
      context: ./oneapi-gateway
    restart: unless-stopped
    ports:
      - "3004:3003"
    volumes:
      - ./config/easyai.yaml:/app/config/easyai.yaml:ro
    depends_on:
      - redis
      - postgres
      - litellm

  batch_worker:
    build:
      context: ./batch-worker
    restart: unless-stopped
    volumes:
      - ./config/easyai.yaml:/app/config/easyai.yaml:ro
    depends_on:
      - redis
      - postgres
      - oneapi

volumes:
  postgres_data:
    name: easyai_dev_postgres_data
  ollama_data:
    name: easyai_dev_ollama_data
