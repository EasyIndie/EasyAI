services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: oneapi
      POSTGRES_PASSWORD: oneapi
      POSTGRES_DB: oneapi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  litellm:
    build:
      context: ./litellm-service
    restart: unless-stopped
    environment:
      LITELLM_CONFIG_PATH: /app/config/litellm.yaml
      OLLAMA_HOST: http://ollama:11434
    ports:
      - "4000:4000"
    volumes:
      - ./config/litellm/litellm.yaml:/app/config/litellm.yaml
    depends_on:
      - ollama

  oneapi:
    build:
      context: ./oneapi-gateway
    restart: unless-stopped
    environment:
      ONEAPI_CONFIG_PATH: /app/config/oneapi.yaml
    ports:
      - "3003:3003"
    volumes:
      - ./config/oneapi/oneapi.yaml:/app/config/oneapi.yaml
    depends_on:
      - redis
      - postgres
      - litellm

  batch_worker:
    build:
      context: ./batch-worker
    restart: unless-stopped
    environment:
      ONEAPI_CONFIG_PATH: /app/config/oneapi.yaml
    volumes:
      - ./config/oneapi/oneapi.yaml:/app/config/oneapi.yaml
    depends_on:
      - redis
      - postgres
      - oneapi

volumes:
  postgres_data:
  ollama_data:
