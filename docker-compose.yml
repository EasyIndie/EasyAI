services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oneapi
      POSTGRES_PASSWORD: oneapi
      POSTGRES_DB: oneapi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  litellm:
    build:
      context: ./litellm-service
    environment:
      LITELLM_CONFIG_PATH: /app/config/litellm.yaml
      OLLAMA_HOST: http://ollama:11434
    ports:
      - "4000:4000"
    volumes:
      - ./config/litellm/litellm.yaml:/app/config/litellm.yaml
    depends_on:
      - ollama

  oneapi:
    build:
      context: ./oneapi-gateway
    environment:
      ONEAPI_CONFIG_PATH: /app/config/oneapi.yaml
    ports:
      - "8080:8080"
    volumes:
      - ./config/oneapi/oneapi.yaml:/app/config/oneapi.yaml
    depends_on:
      - redis
      - postgres
      - litellm

  anythingllm:
    image: mintplexlabs/anythingllm:latest
    ports:
      - "3000:3001"
    environment:
      STORAGE_DIR: /app/server/storage
      JWT_SECRET: easyai-anythingllm-dev-secret
      LLM_PROVIDER: generic-openai
      GENERIC_OPEN_AI_BASE_PATH: http://oneapi:8080/v1
      GENERIC_OPEN_AI_API_KEY: dev-key
      GENERIC_OPEN_AI_MODEL_PREF: local/ollama:qwen2.5:0.5b
      GENERIC_OPEN_AI_MODEL_TOKEN_LIMIT: 32768
    volumes:
      - anythingllm_storage:/app/server/storage
    depends_on:
      - oneapi

  batch_worker:
    build:
      context: ./batch-worker
    environment:
      ONEAPI_CONFIG_PATH: /app/config/oneapi.yaml
    volumes:
      - ./config/oneapi/oneapi.yaml:/app/config/oneapi.yaml
    depends_on:
      - redis
      - postgres
      - oneapi

volumes:
  postgres_data:
  ollama_data:
  anythingllm_storage:
