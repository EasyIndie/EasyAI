apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: batch-worker
  template:
    metadata:
      labels:
        app: batch-worker
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: batch-worker
          image: easyai/batch-worker:latest
          env:
            - name: ONEAPI_CONFIG_PATH
              value: /app/config/oneapi.yaml
          volumeMounts:
            - name: oneapi-config
              mountPath: /app/config/oneapi.yaml
              subPath: oneapi.yaml
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: oneapi-config
          configMap:
            name: oneapi-config
        - name: tmp
          emptyDir: {}
