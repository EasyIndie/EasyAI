apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: batch-worker
  template:
    metadata:
      labels:
        app: batch-worker
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: batch-worker
          image: easyai/batch-worker:latest
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: REDIS_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: DATABASE_URL
            - name: ONEAPI_BASE_URL
              value: http://oneapi:8080
            - name: ONEAPI_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: ONEAPI_INTERNAL_TOKEN
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: tmp
          emptyDir: {}
