apiVersion: apps/v1
kind: Deployment
metadata:
  name: oneapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oneapi
  template:
    metadata:
      labels:
        app: oneapi
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: oneapi
          image: easyai/oneapi-gateway:latest
          ports:
            - containerPort: 3003
          env:
            - name: ONEAPI_CONFIG_PATH
              value: /app/config/oneapi.yaml
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3003
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: oneapi-config
              mountPath: /app/config/oneapi.yaml
              subPath: oneapi.yaml
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: oneapi-config
          configMap:
            name: oneapi-config
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: oneapi
spec:
  selector:
    app: oneapi
  ports:
    - name: http
      port: 3003
      targetPort: 3003
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: oneapi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: oneapi
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
