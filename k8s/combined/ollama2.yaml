apiVersion: v1
kind: Service
metadata:
  name: ollama2
spec:
  selector:
    app: ollama2
  ports:
    - name: http
      port: 11434
      targetPort: 11434
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama2
spec:
  serviceName: ollama2
  replicas: 1
  selector:
    matchLabels:
      app: ollama2
  template:
    metadata:
      labels:
        app: ollama2
    spec:
      containers:
        - name: ollama2
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: ollama2-data
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: ollama2-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 30Gi
