app_env: "development"
port: 3003
log_level: "info"

trust_proxy: false

admin_user: "admin"
admin_pass: "admin"

auth_modes:
  - "apikey"
api_keys:
  - "dev-key"

upstreams:
  - "REPLACE_ME_UPSTREAM"
upstream_timeout_ms: 60000

rate_limit_rpm: 120

cache:
  enabled: true
  ttl_seconds: 60
  replay_chunk_delay_ms: 0
  replay_max_total_ms: 0
  replay_mode: "fixed"

cors:
  origin: "*"

guardrails:
  enabled: true
  block_internal_ip: true
  injection_keywords:
    - "ignore all previous instructions"
    - "system prompt"
    - "developer message"
    - "jailbreak"
  pii_mask_enabled: true

redis_url: "redis://redis:6379"
database_url: "postgres://oneapi:oneapi@postgres:5432/oneapi"

model_map:
  "chat": "local/ollama:qwen2.5:0.5b"
  "coder": "local/ollama:qwen2.5-coder:1.5b"
  "gemma4": "local/ollama:gemma4:e4b"
  "gemma4_2b": "local/ollama:gemma4:e2b"

fallback_map: {}
