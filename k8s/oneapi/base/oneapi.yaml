apiVersion: apps/v1
kind: Deployment
metadata:
  name: oneapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oneapi
  template:
    metadata:
      labels:
        app: oneapi
    spec:
      containers:
        - name: oneapi
          image: easyai/oneapi-gateway:latest
          ports:
            - containerPort: 3003
          env:
            - name: ONEAPI_CONFIG_PATH
              value: /app/config/oneapi.yaml
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3003
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: oneapi-config
              mountPath: /app/config/oneapi.yaml
              subPath: oneapi.yaml
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: oneapi-config
          configMap:
            name: oneapi-config
---
apiVersion: v1
kind: Service
metadata:
  name: oneapi
spec:
  selector:
    app: oneapi
  ports:
    - name: http
      port: 3003
      targetPort: 3003
