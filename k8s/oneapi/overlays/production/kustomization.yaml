apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

secretGenerator:
  - name: oneapi-secrets
    behavior: replace
    literals:
      - POSTGRES_USER=REPLACE_ME
      - POSTGRES_PASSWORD=REPLACE_ME
      - POSTGRES_DB=REPLACE_ME
      - REDIS_URL=REPLACE_ME
      - DATABASE_URL=REPLACE_ME
configMapGenerator:
  - name: oneapi-config
    behavior: replace
    files:
      - oneapi.yaml=oneapi-config.yaml
