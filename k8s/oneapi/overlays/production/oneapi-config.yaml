app_env: "production"
port: 3003
log_level: "info"

trust_proxy: 1

admin_user: "REPLACE_ME_ADMIN_USER"
admin_pass: "REPLACE_ME_ADMIN_PASS"

auth_modes:
  - "apikey"
api_keys:
  - "REPLACE_ME_PRODUCTION_API_KEY"

upstreams:
  - "REPLACE_ME_UPSTREAM"
upstream_timeout_ms: 60000

rate_limit_rpm: 240

cache:
  enabled: true
  ttl_seconds: 60
  replay_chunk_delay_ms: 0
  replay_max_total_ms: 0
  replay_mode: "fixed"

cors:
  origin:
    - "https://REPLACE_ME"

guardrails:
  enabled: true
  block_internal_ip: true
  injection_keywords:
    - "ignore all previous instructions"
    - "system prompt"
    - "developer message"
    - "jailbreak"
  pii_mask_enabled: true

redis_url: "redis://redis:6379"
database_url: "postgres://REPLACE_ME_POSTGRES_USER:REPLACE_ME_POSTGRES_PASSWORD@postgres:5432/REPLACE_ME_POSTGRES_DB"

model_map:
  "chat": "local/ollama:qwen2.5:0.5b"
  "coder": "local/ollama:qwen2.5-coder:1.5b"
  "gemma4": "local/ollama:gemma4:e4b"
  "gemma4_2b": "local/ollama:gemma4:e2b"

fallback_map: {}
